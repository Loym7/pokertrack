    function calcDuration(start, end) {
      if (!start || !end) return '';
      const [sh, sm] = start.split(':').map(Number);
      let [eh, em] = end.split(':').map(Number);
      if (eh < sh) eh += 24;
      const mins = (eh * 60 + em) - (sh * 60 + sm);
      return `${Math.floor(mins / 60)}h${String(mins % 60).padStart(2, '0')}`;
    }

    const EMPTY_TOURN = { name:'', room:'Winamax', startTime:'20:00', buyIn:5, field:'500-999', format:'PKO', priority:'Niv 1', entardive:'' };
    const SESS_CLS = { Matin:'bg-yellow-600 text-white', Jour:'bg-sky-600 text-white', Soir:'bg-indigo-600 text-white' };

    function GridsTab({ savedGrids, setSavedGrids }) {
      const [showCreate, setShowCreate]   = useState(false);
      const [gridForm, setGridForm]       = useState({ name:'', sessionType:'Soir' });
      const [editGridId, setEditGridId]   = useState(null);
      const [expandedId, setExpandedId]   = useState(null);
      const [addTournFor, setAddTournFor] = useState(null); // gridId
      const [tournForm, setTournForm]     = useState(EMPTY_TOURN);
      const [editTourn, setEditTourn]     = useState(null); // { gridId, tournId }

      const gset = k => v => setGridForm(f => ({ ...f, [k]: v }));
      const tset = k => v => setTournForm(f => ({ ...f, [k]: v }));

      // ── Grid CRUD ──
      const saveGrid = () => {
        if (!gridForm.name.trim()) return;
        if (editGridId !== null) {
          setSavedGrids(gs => gs.map(g => g.id === editGridId ? { ...g, ...gridForm } : g));
        } else {
          setSavedGrids(gs => [...gs, { id: uid(), ...gridForm, tournaments: [] }]);
          setExpandedId(null);
        }
        setGridForm({ name:'', sessionType:'Soir' }); setEditGridId(null); setShowCreate(false);
      };

      const startEditGrid = (e, g) => {
        e.stopPropagation();
        setGridForm({ name: g.name, sessionType: g.sessionType });
        setEditGridId(g.id); setShowCreate(true);
      };

      const deleteGrid = (e, id) => {
        e.stopPropagation();
        if (confirm('Supprimer cette grille et tous ses tournois ?'))
          setSavedGrids(gs => gs.filter(g => g.id !== id));
      };

      // ── Tournament CRUD inside a grid ──
      const saveTournament = gridId => {
        if (!tournForm.name.trim()) return;
        const tourn = { ...tournForm, buyIn: Number(tournForm.buyIn), entardive: Number(tournForm.entardive) || 0 };
        if (editTourn && editTourn.gridId === gridId) {
          setSavedGrids(gs => gs.map(g => g.id === gridId
            ? { ...g, tournaments: g.tournaments.map(t => t.id === editTourn.tournId ? { ...tourn, id: editTourn.tournId } : t) }
            : g));
          setEditTourn(null);
        } else {
          setSavedGrids(gs => gs.map(g => g.id === gridId
            ? { ...g, tournaments: [...g.tournaments, { ...tourn, id: uid() }] }
            : g));
        }
        setTournForm(EMPTY_TOURN); setAddTournFor(null);
      };

      const startEditTourn = (gridId, t) => {
        setTournForm({ name:t.name, room:t.room, startTime:t.startTime, buyIn:t.buyIn, field:t.field, format:t.format, priority:t.priority, entardive:t.entardive });
        setEditTourn({ gridId, tournId: t.id });
        setAddTournFor(gridId);
      };

      const deleteTourn = (gridId, tournId) => {
        setSavedGrids(gs => gs.map(g => g.id === gridId
          ? { ...g, tournaments: g.tournaments.filter(t => t.id !== tournId) }
          : g));
      };

      const cancelTournForm = () => { setTournForm(EMPTY_TOURN); setAddTournFor(null); setEditTourn(null); };

      return (
        <div className="p-4 space-y-4">
          {/* Header */}
          <div className="flex items-center justify-between">
            <h2 className="text-lg font-bold text-green-400">Grilles pré-enregistrées — {savedGrids.length}</h2>
            {!showCreate && (
              <Btn onClick={() => { setGridForm({ name:'', sessionType:'Soir' }); setEditGridId(null); setShowCreate(true); }}
                cls="bg-green-600 hover:bg-green-700 text-white">+ Créer une grille</Btn>
            )}
          </div>

          {/* Create / Edit grid form */}
          {showCreate && (
            <div className="bg-gray-800 border border-green-800 rounded-lg p-4">
              <h3 className="text-sm font-semibold text-green-400 mb-3">{editGridId ? '✏️ Modifier la grille' : '➕ Nouvelle grille'}</h3>
              <div className="flex flex-wrap gap-3">
                <div className="flex-1 min-w-48">
                  <label className="text-xs text-gray-400 block mb-1">Nom de la grille *</label>
                  <Inp value={gridForm.name} onChange={gset('name')} placeholder="Ex: Soirée PKO, Après-midi..." cls="w-full" />
                </div>
                <div>
                  <label className="text-xs text-gray-400 block mb-1">Type de session</label>
                  <Sel value={gridForm.sessionType} onChange={gset('sessionType')} options={SESSION_TYPES} cls="w-full" />
                </div>
              </div>
              <div className="flex gap-2 mt-3">
                <Btn onClick={saveGrid} cls="bg-green-600 hover:bg-green-700 text-white">Sauvegarder</Btn>
                <Btn onClick={() => { setShowCreate(false); setEditGridId(null); }} cls="bg-gray-600 hover:bg-gray-700 text-white">Annuler</Btn>
              </div>
            </div>
          )}

          {/* Grid cards */}
          {savedGrids.length === 0 && (
            <div className="text-center py-16 text-gray-600">
              <div className="text-5xl mb-3">📋</div>
              <p className="text-sm">Aucune grille. Créez-en une pour commencer.</p>
            </div>
          )}

          {savedGrids.map(grid => {
            const isOpen = expandedId === grid.id;
            const isAddingHere = addTournFor === grid.id;
            return (
              <div key={grid.id} className="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden">
                {/* Card header — clickable to expand */}
                <div className="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-750 transition-colors select-none"
                  onClick={() => setExpandedId(isOpen ? null : grid.id)}>
                  <div className="flex items-center gap-3">
                    <span className="text-white font-semibold">{grid.name}</span>
                    <Badge cls={SESS_CLS[grid.sessionType] || 'bg-gray-600 text-white'}>{grid.sessionType}</Badge>
                    <span className="text-gray-500 text-xs">{grid.tournaments.length} tournoi{grid.tournaments.length !== 1 ? 's' : ''}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <button onClick={e => startEditGrid(e, grid)} className="text-blue-400 hover:text-blue-200 text-sm" title="Renommer">✏️</button>
                    <button onClick={e => deleteGrid(e, grid.id)} className="text-red-400 hover:text-red-200 text-sm" title="Supprimer">🗑️</button>
                    <span className="text-gray-500 text-xs ml-1">{isOpen ? '▲' : '▼'}</span>
                  </div>
                </div>

                {/* Expanded content */}
                {isOpen && (
                  <div className="border-t border-gray-700">
                    {/* Tournament table */}
                    {grid.tournaments.length > 0 && (
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                          <thead className="bg-gray-900 text-gray-400 text-xs uppercase">
                            <tr>
                              {['Nom','Room','Heure','Buy-In','Field','Format','Priorité','EnTardive',''].map(h => (
                                <th key={h} className="px-3 py-2 whitespace-nowrap">{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {grid.tournaments.map(t => (
                              <tr key={t.id} className="border-t border-gray-700 hover:bg-gray-700/40 transition-colors">
                                <td className="px-3 py-2 font-medium text-white">{t.name}</td>
                                <td className="px-3 py-2"><Badge cls={ROOM_CLS[t.room]}>{t.room}</Badge></td>
                                <td className="px-3 py-2 text-gray-300">{t.startTime}</td>
                                <td className="px-3 py-2 text-gray-300">{t.buyIn}€</td>
                                <td className="px-3 py-2 text-gray-400 text-xs">{t.field}</td>
                                <td className="px-3 py-2"><Badge cls={FMT_CLS[t.format]}>{t.format}</Badge></td>
                                <td className="px-3 py-2"><Badge cls={PRIO_CLS[t.priority]}>{t.priority}</Badge></td>
                                <td className="px-3 py-2 text-gray-400 text-xs">{t.entardive || '—'}</td>
                                <td className="px-3 py-2">
                                  <div className="flex gap-2">
                                    <button onClick={() => startEditTourn(grid.id, t)} className="text-blue-400 hover:text-blue-200 text-sm">✏️</button>
                                    <button onClick={() => deleteTourn(grid.id, t.id)} className="text-red-400 hover:text-red-200 text-sm">🗑️</button>
                                  </div>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {grid.tournaments.length === 0 && !isAddingHere && (
                      <p className="text-xs text-gray-600 px-4 py-3">Aucun tournoi dans cette grille.</p>
                    )}

                    {/* Add / Edit tournament form */}
                    {isAddingHere && (
                      <div className="bg-gray-900/60 border-t border-gray-700 px-4 py-3">
                        <p className="text-xs font-semibold text-green-400 mb-2">{editTourn ? '✏️ Modifier le tournoi' : '➕ Ajouter un tournoi'}</p>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2">
                          <div className="col-span-2">
                            <label className="text-xs text-gray-500 block mb-0.5">Nom *</label>
                            <Inp value={tournForm.name} onChange={tset('name')} placeholder="Nom du tournoi" cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">Room</label>
                            <Sel value={tournForm.room} onChange={tset('room')} options={ROOMS} cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">Heure</label>
                            <Inp type="time" value={tournForm.startTime} onChange={tset('startTime')} cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">Buy-In</label>
                            <Sel value={tournForm.buyIn} onChange={tset('buyIn')} options={BUY_INS.map(b => ({ value:b, label:`${b}€` }))} cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">Field</label>
                            <Sel value={tournForm.field} onChange={tset('field')} options={FIELDS} cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">Format</label>
                            <Sel value={tournForm.format} onChange={tset('format')} options={FORMATS} cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">Priorité</label>
                            <Sel value={tournForm.priority} onChange={tset('priority')} options={PRIORITIES} cls="w-full" />
                          </div>
                          <div>
                            <label className="text-xs text-gray-500 block mb-0.5">EnTardive</label>
                            <Inp type="number" value={tournForm.entardive} onChange={tset('entardive')} placeholder="22.5" cls="w-full" />
                          </div>
                        </div>
                        <div className="flex gap-2 mt-2">
                          <Btn onClick={() => saveTournament(grid.id)} cls="bg-green-600 hover:bg-green-700 text-white text-xs">
                            {editTourn ? 'Modifier' : 'Ajouter'}
                          </Btn>
                          <Btn onClick={cancelTournForm} cls="bg-gray-600 hover:bg-gray-700 text-white text-xs">Annuler</Btn>
                        </div>
                      </div>
                    )}

                    {/* Footer actions */}
                    {!isAddingHere && (
                      <div className="px-4 py-2 border-t border-gray-700/50">
                        <Btn onClick={() => { setTournForm(EMPTY_TOURN); setEditTourn(null); setAddTournFor(grid.id); }}
                          cls="bg-gray-700 hover:bg-gray-600 text-green-400 text-xs">+ Ajouter un tournoi</Btn>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── TAB 2 — GRILLE DU JOUR ───────────────────────────────────
    const EMPTY_PONCT = { name:'', room:'Winamax', startTime:'20:00', buyIn:5, field:'500-999', format:'PKO', priority:'Niv 1', entardive:'' };

    function DailyGridTab({ savedGrids, setPlayedTournaments, sessions, setSessions }) {
      const [date, setDate]           = useState(todayStr);
      const [typeSession, setTypeSession] = useState('Soir');
      const [selectedGridId, setSelId] = useState('');
      const [rows, setRows]           = useState([]);
      const [generated, setGen]       = useState(false);
      const [showPonct, setShowP]     = useState(false);
      const [ponct, setPonct]         = useState(EMPTY_PONCT);
      const [validated, setVal]       = useState(false);
      const dragIdx = useRef(null);

      const loadGrid = () => {
        const grid = savedGrids.find(g => g.id === Number(selectedGridId));
        const source = grid ? grid.tournaments : [];
        setRows(source.map(t => ({
          _gid: uid(), libId: t.id, name: t.name, room: t.room,
          startTime: t.startTime, buyIn: t.buyIn, field: t.field,
          format: t.format, priority: t.priority, entardive: t.entardive,
          favorite: false, entry: false, reEntry: false, itm: false, gains: 0,
        })));
        setGen(true); setVal(false);
      };

      const upd = (gid, k, v) => setRows(r => r.map(x => x._gid === gid ? { ...x, [k]: v } : x));
      const del  = gid => setRows(r => r.filter(x => x._gid !== gid));
      const pSet = k => v => setPonct(f => ({ ...f, [k]: v }));

      const addPonct = () => {
        if (!ponct.name.trim()) return;
        setRows(r => [...r, {
          _gid: uid(), libId: null, ...ponct,
          buyIn: Number(ponct.buyIn), entardive: Number(ponct.entardive) || 0,
          favorite: false, entry: false, reEntry: false, itm: false, gains: 0,
        }]);
        setPonct(EMPTY_PONCT); setShowP(false);
      };

      const validate = () => {
        const played = rows.filter(r => r.entry);
        if (!played.length) { alert('Aucun tournoi coché (Entry).'); return; }

        // Trouve ou crée la session Grind pour cette date + typeSession
        let sess = sessions.find(s => s.date === date && s.type === 'Grind' && s.typeSession === typeSession);
        if (!sess) {
          const grindSessions = sessions.filter(s => s.type === 'Grind');
          const lastNum = grindSessions.reduce((max, s) => {
            const n = parseInt(s.code.replace('G', ''), 10);
            return isNaN(n) ? max : Math.max(max, n);
          }, 0);
          sess = {
            id: uid(),
            code: `G${lastNum + 1}`,
            date,
            type: 'Grind',
            start: '', end: '',
            typeSession,
            hands: 0,
            duration: '',
          };
          setSessions(prev => [...prev, sess]);
        }

        setPlayedTournaments(prev => [...prev, ...played.map(r => ({
          id: uid(), date, session: sess.code,
          room: r.room, buyIn: r.buyIn, entry: true, reEntry: r.reEntry,
          field: r.field, format: r.format, itm: r.itm,
          gains: Number(r.gains), nbEntry: r.reEntry ? 2 : 1,
          profit: Math.round((Number(r.gains) - r.buyIn * (r.reEntry ? 2 : 1)) * 100) / 100,
        }))]);
        setVal(true);
      };

      const onDragStart = (e, i) => { dragIdx.current = i; e.dataTransfer.effectAllowed = 'move'; };
      const onDragOver  = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
      const onDrop      = (e, i) => {
        e.preventDefault();
        const from = dragIdx.current;
        if (from === null || from === i) return;
        setRows(r => {
          const copy = [...r];
          const [item] = copy.splice(from, 1);
          copy.splice(i, 0, item);
          return copy;
        });
        dragIdx.current = null;
      };

      return (
        <div className="p-4 space-y-4">
          <div className="flex flex-wrap items-end gap-3">
            <div>
              <p className="text-xs text-gray-500 mb-1">Date</p>
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                className="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-green-500" />
            </div>
            <div>
              <p className="text-xs text-gray-500 mb-1">Moment</p>
              <Sel value={typeSession} onChange={setTypeSession}
                options={['Matin','Jour','Soir']} />
            </div>
            <div className="flex-1 min-w-48">
              <p className="text-xs text-gray-500 mb-1">Grille pré-enregistrée</p>
              <select value={selectedGridId} onChange={e => setSelId(e.target.value)}
                className="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-green-500">
                <option value="">— Grille vide —</option>
                {savedGrids.map(g => (
                  <option key={g.id} value={g.id}>{g.name} ({g.sessionType} · {g.tournaments.length} tournois)</option>
                ))}
              </select>
            </div>
            <Btn onClick={loadGrid} cls="bg-green-600 hover:bg-green-700 text-white font-semibold">⚡ Charger</Btn>
            {generated && (
              <Btn onClick={() => setShowP(v => !v)} cls="bg-gray-600 hover:bg-gray-700 text-white">+ Ajout ponctuel</Btn>
            )}
            {validated && <span className="text-green-400 text-sm font-semibold self-center">✓ Journée validée</span>}
          </div>
          {generated && (
            <div className="flex items-center gap-2 text-xs text-gray-500">
              <span>📋</span>
              <span>
                {selectedGridId
                  ? <>Grille <span className="text-green-400 font-medium">{savedGrids.find(g=>g.id===Number(selectedGridId))?.name}</span> chargée</>
                  : 'Grille vide — ajoutez des tournois ponctuels'}
              </span>
            </div>
          )}

          {showPonct && (
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-3">
              <p className="text-xs font-semibold text-gray-400 mb-2">Tournoi ponctuel</p>
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2">
                <div className="col-span-2">
                  <Inp value={ponct.name} onChange={pSet('name')} placeholder="Nom du tournoi" cls="w-full" />
                </div>
                <Sel value={ponct.room} onChange={pSet('room')} options={ROOMS} cls="w-full" />
                <Inp type="time" value={ponct.startTime} onChange={pSet('startTime')} cls="w-full" />
                <Sel value={ponct.buyIn} onChange={pSet('buyIn')} options={BUY_INS.map(b => ({ value:b, label:`${b}€` }))} cls="w-full" />
                <Sel value={ponct.field} onChange={pSet('field')} options={FIELDS} cls="w-full" />
                <Sel value={ponct.format} onChange={pSet('format')} options={FORMATS} cls="w-full" />
                <Sel value={ponct.priority} onChange={pSet('priority')} options={PRIORITIES} cls="w-full" />
              </div>
              <div className="flex gap-2 mt-2">
                <Btn onClick={addPonct} cls="bg-green-600 hover:bg-green-700 text-white text-xs">Ajouter</Btn>
                <Btn onClick={() => setShowP(false)} cls="bg-gray-600 hover:bg-gray-700 text-white text-xs">Annuler</Btn>
              </div>
            </div>
          )}

          {!generated ? (
            <div className="text-center py-20 text-gray-600">
              <div className="text-5xl mb-3">📅</div>
              <p className="text-sm">Sélectionnez une date, choisissez une grille et cliquez sur "Charger"</p>
              <p className="text-xs mt-1 text-gray-700">{savedGrids.length} grille{savedGrids.length !== 1 ? 's' : ''} pré-enregistrée{savedGrids.length !== 1 ? 's' : ''} disponible{savedGrids.length !== 1 ? 's' : ''}</p>
            </div>
          ) : (
            <>
              <div className="overflow-x-auto rounded-lg border border-gray-700">
                <table className="w-full text-sm text-left" style={{ minWidth: '1050px' }}>
                  <thead className="bg-gray-800 text-gray-400 text-xs uppercase">
                    <tr>
                      <th className="px-2 py-2 w-8">☆</th>
                      <th className="px-2 py-2">Tard.</th>
                      <th className="px-2 py-2">Prio</th>
                      <th className="px-2 py-2">Heure</th>
                      <th className="px-2 py-2">Tournoi</th>
                      <th className="px-2 py-2">Room</th>
                      <th className="px-2 py-2">BI</th>
                      <th className="px-2 py-2 text-center">Entry</th>
                      <th className="px-2 py-2 text-center">Re-Entry</th>
                      <th className="px-2 py-2">Field</th>
                      <th className="px-2 py-2">Fmt</th>
                      <th className="px-2 py-2 text-center">ITM</th>
                      <th className="px-2 py-2">Gains (€)</th>
                      <th className="px-2 py-2 w-6"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((r, i) => (
                      <tr key={r._gid}
                        draggable
                        onDragStart={e => onDragStart(e, i)}
                        onDragOver={onDragOver}
                        onDrop={e => onDrop(e, i)}
                        style={{ borderLeft: r.favorite ? '3px solid #facc15' : '3px solid transparent' }}
                        className={`border-t border-gray-700 cursor-grab active:cursor-grabbing transition-colors
                          ${r.entry ? 'bg-green-900/20' : 'hover:bg-gray-800/50'}`}>
                        <td className="px-2 py-1.5">
                          <button onClick={() => upd(r._gid, 'favorite', !r.favorite)}
                            className={`text-lg leading-none transition-colors ${r.favorite ? 'text-yellow-400' : 'text-gray-700 hover:text-yellow-600'}`}>★</button>
                        </td>
                        <td className="px-2 py-1.5 text-gray-500 text-xs">{r.entardive || '—'}</td>
                        <td className="px-2 py-1.5"><Badge cls={PRIO_CLS[r.priority]}>{r.priority}</Badge></td>
                        <td className="px-2 py-1.5 text-gray-300">{r.startTime}</td>
                        <td className="px-2 py-1.5 font-medium text-white">{r.name}</td>
                        <td className="px-2 py-1.5"><Badge cls={ROOM_CLS[r.room]}>{r.room}</Badge></td>
                        <td className="px-2 py-1.5 text-gray-300 whitespace-nowrap">{r.buyIn}€</td>
                        <td className="px-2 py-1.5 text-center"><Cb checked={r.entry} onChange={v => upd(r._gid, 'entry', v)} /></td>
                        <td className="px-2 py-1.5 text-center"><Cb checked={r.reEntry} onChange={v => upd(r._gid, 'reEntry', v)} /></td>
                        <td className="px-2 py-1.5 text-gray-400 text-xs">{r.field}</td>
                        <td className="px-2 py-1.5"><Badge cls={FMT_CLS[r.format]}>{r.format}</Badge></td>
                        <td className="px-2 py-1.5 text-center"><Cb checked={r.itm} onChange={v => upd(r._gid, 'itm', v)} /></td>
                        <td className="px-2 py-1.5">
                          <input type="number" value={r.gains}
                            onChange={e => upd(r._gid, 'gains', e.target.value)}
                            className="w-20 bg-gray-700 border border-gray-600 rounded px-2 py-0.5 text-sm text-white focus:outline-none focus:border-green-500" />
                        </td>
                        <td className="px-2 py-1.5">
                          <button onClick={() => del(r._gid)} className="text-gray-600 hover:text-red-400 transition-colors text-sm">✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="flex justify-between items-center">
                <span className="text-sm text-gray-500">
                  {rows.filter(r => r.entry).length} / {rows.length} tournois sélectionnés
                </span>
                <Btn onClick={validate} cls="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2 text-base">
                  ✓ Valider la journée
                </Btn>
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── TAB 3 — SESSIONS & TOURNOIS ──────────────────────────────
    function SessionsTab({ sessions, setSessions, playedTournaments, setPlayed }) {
      const [sub, setSub]           = useState('grind');
      const [showForm, setShow]     = useState(false);
      const [page, setPage]         = useState(1);
      const [confirmDel, setConfirm] = useState(null); // session à supprimer
      const PER_PAGE = 15;

      const emptyF = { type:'Grind', date:todayStr, start:'18:00', end:'23:00', hands:0 };
      const [form, setForm] = useState(emptyF);
      const set = k => v => setForm(f => ({ ...f, [k]: v }));

      const grindN  = sessions.filter(s => s.type === 'Grind').length;
      const travN   = sessions.filter(s => s.type === 'Travail').length;

      const save = () => {
        const prefix = form.type === 'Grind' ? 'G' : 'T';
        const n      = form.type === 'Grind' ? grindN + 1 : travN + 1;
        setSessions(prev => [...prev, {
          id: uid(), code: `${prefix}${n}`, ...form,
          hands: Number(form.hands),
          typeSession: typeSession(form.start),
          duration: calcDuration(form.start, form.end),
        }]);
        setForm(emptyF); setShow(false);
      };

      const totalPages = Math.ceil(playedTournaments.length / PER_PAGE);
      const pageData   = playedTournaments.slice((page - 1) * PER_PAGE, page * PER_PAGE);

      return (
        <>
        <div className="p-4 space-y-4">
          <div className="flex gap-1 border-b border-gray-700">
            {[['grind','Sessions Grind'],['travail','Sessions Travail'],['tournois','Tournois Joués']].map(([k,l]) => (
              <button key={k} onClick={() => setSub(k)}
                className={`px-5 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors
                  ${sub===k
                    ? k==='grind'   ? 'border-green-500 text-green-400'
                    : k==='travail' ? 'border-blue-500 text-blue-400'
                    :                 'border-purple-500 text-purple-400'
                    : 'border-transparent text-gray-400 hover:text-white'}`}>
                {l}
              </button>
            ))}
          </div>

          {/* ── Onglet Sessions Grind ── */}
          {sub === 'grind' && (
            <div className="space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-gray-300 text-sm">
                  <span className="text-green-400 font-semibold">{sessions.filter(s=>s.type==='Grind').length}</span> sessions Grind
                </span>
                {!showForm && (
                  <Btn onClick={() => { setForm({...emptyF, type:'Grind'}); setShow(true); }} cls="bg-green-600 hover:bg-green-700 text-white">+ Nouvelle session</Btn>
                )}
              </div>

              {showForm && form.type === 'Grind' && (
                <div className="bg-gray-800 border border-gray-700 rounded-lg p-3">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Date</label>
                      <Inp type="date" value={form.date} onChange={set('date')} cls="w-full" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Début</label>
                      <Inp type="time" value={form.start} onChange={set('start')} cls="w-full" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Fin</label>
                      <Inp type="time" value={form.end} onChange={set('end')} cls="w-full" />
                    </div>
                  </div>
                  <div className="mt-2 text-xs text-gray-500">
                    Durée calculée : {calcDuration(form.start, form.end)} | Moment : {typeSession(form.start)}
                  </div>
                  <div className="flex gap-2 mt-3">
                    <Btn onClick={save} cls="bg-green-600 hover:bg-green-700 text-white">Sauvegarder</Btn>
                    <Btn onClick={() => setShow(false)} cls="bg-gray-600 hover:bg-gray-700 text-white">Annuler</Btn>
                  </div>
                </div>
              )}

              <div className="overflow-x-auto rounded-lg border border-gray-700">
                <table className="w-full text-sm">
                  <thead className="bg-gray-800 text-gray-400 text-xs uppercase">
                    <tr>{['ID','Date','Moment','Début','Fin','Durée',''].map(h=>(
                      <th key={h} className="px-3 py-2 text-left">{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {[...sessions].filter(s=>s.type==='Grind').reverse().map(s=>(
                      <tr key={s.id} className="border-t border-gray-700 hover:bg-gray-800/50">
                        <td className="px-3 py-2 font-mono text-green-400 font-semibold">{s.code}</td>
                        <td className="px-3 py-2 text-gray-300">{s.date}</td>
                        <td className="px-3 py-2 text-gray-400">{s.typeSession}</td>
                        <td className="px-3 py-2 text-gray-300">{s.start}</td>
                        <td className="px-3 py-2 text-gray-300">{s.end}</td>
                        <td className="px-3 py-2 text-gray-300 font-medium">{s.duration}</td>
                        <td className="px-3 py-2">
                          <button onClick={() => setConfirm(s)}
                            className="text-red-400 hover:text-red-300 text-xs px-2 py-0.5 rounded hover:bg-red-900/30 transition-colors">✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── Onglet Sessions Travail ── */}
          {sub === 'travail' && (
            <div className="space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-gray-300 text-sm">
                  <span className="text-blue-400 font-semibold">{sessions.filter(s=>s.type==='Travail').length}</span> sessions Travail
                </span>
                {!showForm && (
                  <Btn onClick={() => { setForm({...emptyF, type:'Travail'}); setShow(true); }} cls="bg-blue-600 hover:bg-blue-700 text-white">+ Nouvelle session</Btn>
                )}
              </div>

              {showForm && form.type === 'Travail' && (
                <div className="bg-gray-800 border border-gray-700 rounded-lg p-3">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Date</label>
                      <Inp type="date" value={form.date} onChange={set('date')} cls="w-full" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Début</label>
                      <Inp type="time" value={form.start} onChange={set('start')} cls="w-full" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Fin</label>
                      <Inp type="time" value={form.end} onChange={set('end')} cls="w-full" />
                    </div>
                  </div>
                  <div className="mt-2 text-xs text-gray-500">
                    Durée calculée : {calcDuration(form.start, form.end)}
                  </div>
                  <div className="flex gap-2 mt-3">
                    <Btn onClick={save} cls="bg-blue-600 hover:bg-blue-700 text-white">Sauvegarder</Btn>
                    <Btn onClick={() => setShow(false)} cls="bg-gray-600 hover:bg-gray-700 text-white">Annuler</Btn>
                  </div>
                </div>
              )}

              <div className="overflow-x-auto rounded-lg border border-gray-700">
                <table className="w-full text-sm">
                  <thead className="bg-gray-800 text-gray-400 text-xs uppercase">
                    <tr>{['ID','Date','Début','Fin','Durée',''].map(h=>(
                      <th key={h} className="px-3 py-2 text-left">{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {[...sessions].filter(s=>s.type==='Travail').reverse().map(s=>(
                      <tr key={s.id} className="border-t border-gray-700 hover:bg-gray-800/50">
                        <td className="px-3 py-2 font-mono text-blue-400 font-semibold">{s.code}</td>
                        <td className="px-3 py-2 text-gray-300">{s.date}</td>
                        <td className="px-3 py-2 text-gray-300">{s.start}</td>
                        <td className="px-3 py-2 text-gray-300">{s.end}</td>
                        <td className="px-3 py-2 text-gray-300 font-medium">{s.duration}</td>
                        <td className="px-3 py-2">
                          <button onClick={() => setConfirm(s)}
                            className="text-red-400 hover:text-red-300 text-xs px-2 py-0.5 rounded hover:bg-red-900/30 transition-colors">✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {sub === 'tournois' && (
            <div className="space-y-3">
              <span className="text-gray-300 text-sm">{playedTournaments.length} tournois enregistrés</span>
              <div className="overflow-x-auto rounded-lg border border-gray-700">
                <table className="w-full text-sm" style={{ minWidth: '900px' }}>
                  <thead className="bg-gray-800 text-gray-400 text-xs uppercase">
                    <tr>
                      {['Date','Session','Room','Buy-In','Entry','Re-Entry','Field','Format','ITM','Gains','Entrées','Profit'].map(h => (
                        <th key={h} className="px-3 py-2 text-left">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {pageData.map(t => (
                      <tr key={t.id} className={`border-t border-gray-700 hover:bg-gray-800/50
                        ${t.profit > 0 ? 'bg-green-950/40' : t.profit < 0 ? 'bg-red-950/30' : ''}`}>
                        <td className="px-3 py-2 text-gray-400 text-xs">{t.date}</td>
                        <td className="px-3 py-2 font-mono text-green-400">{t.session}</td>
                        <td className="px-3 py-2"><Badge cls={ROOM_CLS[t.room]}>{t.room}</Badge></td>
                        <td className="px-3 py-2 text-gray-300">{t.buyIn}€</td>
                        <td className="px-3 py-2 text-center text-green-400">{t.entry ? '✓' : '—'}</td>
                        <td className="px-3 py-2 text-center">
                          {t.nbEntry > 1
                            ? <span className="text-orange-400 font-semibold">×{t.nbEntry - 1}</span>
                            : <span className="text-gray-600">—</span>}
                        </td>
                        <td className="px-3 py-2 text-gray-400 text-xs">{t.field}</td>
                        <td className="px-3 py-2"><Badge cls={FMT_CLS[t.format]}>{t.format}</Badge></td>
                        <td className="px-3 py-2 text-center">{t.itm ? <span className="text-green-400 font-bold">✓</span> : <span className="text-gray-600">—</span>}</td>
                        <td className="px-3 py-2 text-gray-300">{t.gains > 0 ? `${t.gains}€` : '—'}</td>
                        <td className="px-3 py-2 text-gray-400">{t.nbEntry}</td>
                        <td className={`px-3 py-2 font-bold ${t.profit > 0 ? 'text-green-400' : t.profit < 0 ? 'text-red-400' : 'text-gray-400'}`}>
                          {t.profit > 0 ? '+' : ''}{t.profit.toFixed(2)}€
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {totalPages > 1 && (
                <div className="flex gap-2 items-center justify-center">
                  <Btn onClick={() => setPage(p => Math.max(1,p-1))} cls="bg-gray-700 hover:bg-gray-600 text-white" disabled={page===1}>←</Btn>
                  <span className="text-xs text-gray-400">{page} / {totalPages}</span>
                  <Btn onClick={() => setPage(p => Math.min(totalPages,p+1))} cls="bg-gray-700 hover:bg-gray-600 text-white" disabled={page===totalPages}>→</Btn>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Modale confirmation suppression session */}
        {confirmDel && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50">
            <div className="bg-gray-800 border border-gray-600 rounded-xl p-6 w-80 shadow-xl space-y-4">
              <p className="text-white font-semibold text-base">Supprimer la session ?</p>
              <p className="text-gray-300 text-sm">
                Êtes-vous sûr de vouloir supprimer la session{' '}
                <span className="text-green-400 font-mono font-bold">{confirmDel.code}</span>{' '}
                du <span className="text-gray-100">{confirmDel.date}</span> ?
                <br/><span className="text-red-400">Les tournois associés seront aussi supprimés.</span>
              </p>
              <div className="flex gap-3 justify-end">
                <Btn onClick={() => setConfirm(null)} cls="bg-gray-600 hover:bg-gray-500 text-white">Annuler</Btn>
                <Btn onClick={() => {
                  setSessions(p => p.filter(x => x.id !== confirmDel.id));
                  setPlayed(p => p.filter(x => x.session !== confirmDel.code));
                  setConfirm(null);
                }} cls="bg-red-600 hover:bg-red-500 text-white font-semibold">Supprimer</Btn>
              </div>
            </div>
          </div>
        )}
        </>
      );
    }

    // ─── TAB 4 — DASHBOARD ────────────────────────────────────────
    function DashboardTab({ sessions, playedTournaments }) {
      const [dashTab, setDashTab]     = useState('tournois');
      const [period, setPeriod]       = useState('30');
      const [dateFrom, setDateFrom]   = useState('');
      const [dateTo, setDateTo]       = useState('');
      const [fRoom, setFRoom]         = useState([]);
      const [fFormat, setFFormat]     = useState([]);
      const [fBuyin, setFBuyin]       = useState([]);
      const [fField, setFField]       = useState([]);
      const toggle = (set) => (val) => { set(prev => prev.includes(val) ? prev.filter(x=>x!==val) : [...prev, val]); setPage(1); };
      const [sortCol, setSortCol]     = useState('date');
      const [sortDir, setSortDir]     = useState('desc');
      const [page, setPage]           = useState(1);
      const PER_PAGE = 10;

      const isCustom = period === 'custom';

      const cutoff = useMemo(() => {
        if (isCustom || period === 'all') return null;
        const d = new Date(); d.setDate(d.getDate() - Number(period)); return toStr(d);
      }, [period, isCustom]);

      const filtered = useMemo(() => playedTournaments.filter(t => {
        if (isCustom) {
          if (dateFrom && t.date < dateFrom) return false;
          if (dateTo   && t.date > dateTo)   return false;
        } else {
          if (cutoff && t.date < cutoff) return false;
        }
        if (fRoom.length   > 0 && !fRoom.includes(t.room))          return false;
        if (fFormat.length > 0 && !fFormat.includes(t.format))      return false;
        if (fBuyin.length  > 0 && !fBuyin.includes(t.buyIn))        return false;
        if (fField.length  > 0 && !fField.includes(t.field))        return false;
        return true;
      }), [playedTournaments, cutoff, isCustom, dateFrom, dateTo, fRoom, fFormat, fBuyin, fField]);

      const filtSess = useMemo(() =>
        sessions.filter(s => {
          if (s.type !== 'Grind') return false;
          if (isCustom) {
            if (dateFrom && s.date < dateFrom) return false;
            if (dateTo   && s.date > dateTo)   return false;
          } else {
            if (cutoff && s.date < cutoff) return false;
          }
          return true;
        }), [sessions, cutoff, isCustom, dateFrom, dateTo]);

      const kpi = useMemo(() => {
        const totalH = filtSess.reduce((acc, s) => {
          const parts = s.duration.replace('h', ':').split(':');
          return acc + Number(parts[0]) + (Number(parts[1]) || 0) / 60;
        }, 0);
        const invest = filtered.reduce((a, t) => a + t.buyIn * t.nbEntry, 0);
        const gains  = filtered.reduce((a, t) => a + t.gains, 0);
        const profit = Math.round((gains - invest) * 100) / 100;
        const roi       = invest > 0 ? ((profit / invest) * 100).toFixed(1) : '0';
        const itm       = filtered.filter(t => t.itm).length;
        const totalEntries = filtered.reduce((a, t) => a + t.nbEntry, 0);
        const itmR      = totalEntries > 0 ? ((itm / totalEntries) * 100).toFixed(1) : '0';
        const reEntries = filtered.reduce((a, t) => a + Math.max(0, t.nbEntry - 1), 0);
        return { grind: filtSess.length, hours: Math.round(totalH), total: filtered.length, roi, profit, itmR, reEntries };
      }, [filtered, filtSess]);

      const cumulData = useMemo(() => {
        const sorted = [...filtered].sort((a,b) => a.date.localeCompare(b.date));
        let cum = 0;
        const map = {};
        sorted.forEach(t => { cum += t.profit; map[t.date] = cum; });
        return Object.entries(map).map(([d, profit]) => ({ date: d.slice(5), profit }));
      }, [filtered]);

      const byRoom = useMemo(() => {
        const m = {};
        filtered.forEach(t => { m[t.room] = (m[t.room]||0) + t.profit; });
        return Object.entries(m).map(([room,profit]) => ({ room, profit }));
      }, [filtered]);

      const byFormat = useMemo(() => {
        const m = {};
        filtered.forEach(t => { m[t.format] = (m[t.format]||0) + t.profit; });
        return Object.entries(m).map(([format,profit]) => ({ format, profit }));
      }, [filtered]);

      const byField = useMemo(() => {
        const ORDER = ['0-149','150-499','500-999','1000-2000','2000+'];
        const m = {};
        filtered.forEach(t => { m[t.field] = (m[t.field]||0) + t.profit; });
        return ORDER.filter(f => f in m).map(f => ({ field: f, profit: m[f] }));
      }, [filtered]);

      // ── Données dashboard Structure ──
      const filtTravail = useMemo(() =>
        sessions.filter(s => {
          if (s.type !== 'Travail') return false;
          if (isCustom) {
            if (dateFrom && s.date < dateFrom) return false;
            if (dateTo   && s.date > dateTo)   return false;
          } else {
            if (cutoff && s.date < cutoff) return false;
          }
          return true;
        }), [sessions, cutoff, isCustom, dateFrom, dateTo]);

      const structData = useMemo(() => {
        const parseDur = s => { const p = s.duration.replace('h',':').split(':'); return Number(p[0])+(Number(p[1])||0)/60; };
        const hGrind   = filtSess.reduce((a,s) => a + parseDur(s), 0);
        const hTravail = filtTravail.reduce((a,s) => a + parseDur(s), 0);
        const total    = hGrind + hTravail;
        const ratioG   = total > 0 ? Math.round(hGrind/total*100) : 0;
        const ratioT   = total > 0 ? Math.round(hTravail/total*100) : 0;

        const MOMENT_COLORS = { Matin:'#f59e0b', Jour:'#38bdf8', Soir:'#818cf8', Live:'#34d399' };
        const byMomentCount = ['Matin','Jour','Soir','Live'].map(m => ({
          name: m, value: filtered.filter(t => filtSess.find(s=>s.code===t.session && s.typeSession===m)).length,
          fill: MOMENT_COLORS[m],
        })).filter(x => x.value > 0);

        const byFormatCount = FORMATS.map(f => ({ name:f, value: filtered.filter(t=>t.format===f).length })).filter(x=>x.value>0);
        const byFieldCount  = ['0-149','150-499','500-999','1000-2000','2000+'].map(f => ({ name:f, value: filtered.filter(t=>t.field===f).length })).filter(x=>x.value>0);
        const byBuyinCount  = BUY_INS.map(b => ({ name:`${b}€`, value: filtered.filter(t=>t.buyIn===b).length, _b:b })).filter(x=>x.value>0);

        return { hGrind: Math.round(hGrind), hTravail: Math.round(hTravail),
                 total: Math.round(total), ratioG, ratioT,
                 byMomentCount, byFormatCount, byFieldCount, byBuyinCount };
      }, [filtSess, filtTravail, filtered]);

      const byBuyin = useMemo(() => {
        const m = {};
        filtered.forEach(t => { m[t.buyIn] = (m[t.buyIn]||0) + t.profit; });
        return Object.entries(m).map(([b,profit]) => ({ buyin:`${b}€`, profit, _b: Number(b) })).sort((a,b) => a._b - b._b);
      }, [filtered]);

      const sorted = useMemo(() => {
        return [...filtered].sort((a,b) => {
          let va = a[sortCol], vb = b[sortCol];
          if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
          return sortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
        });
      }, [filtered, sortCol, sortDir]);

      const totalPages = Math.ceil(sorted.length / PER_PAGE);
      const pageData   = sorted.slice((page-1)*PER_PAGE, page*PER_PAGE);

      const sort = col => {
        if (sortCol === col) setSortDir(d => d==='asc'?'desc':'asc');
        else { setSortCol(col); setSortDir('desc'); }
        setPage(1);
      };

      const SortTh = ({ col, children }) => (
        <th className="px-3 py-2 cursor-pointer select-none hover:text-white whitespace-nowrap text-left"
          onClick={() => sort(col)}>
          {children}{sortCol===col ? (sortDir==='asc'?' ↑':' ↓') : ''}
        </th>
      );

      const KpiCard = ({ label, value, color='text-white' }) => (
        <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <p className="text-xs text-gray-500 mb-1">{label}</p>
          <p className={`text-2xl font-bold ${color}`}>{value}</p>
        </div>
      );

      const ttStyle     = { background:'#1f2937', border:'1px solid #374151', color:'#e5e7eb', borderRadius:'6px' };
      const ttLabelStyle = { color:'#9ca3af', fontWeight:500 };
      const ttItemStyle  = { color:'#e5e7eb' };

      return (
        <div className="p-4 space-y-5">

          {/* Onglets Dashboard */}
          <div className="flex gap-1 border-b border-gray-700">
            {[['tournois','📈 Performance'],['sessions','🔍 Structure']].map(([k,l]) => (
              <button key={k} onClick={() => setDashTab(k)}
                className={`px-5 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors
                  ${dashTab===k ? 'border-green-500 text-green-400' : 'border-transparent text-gray-400 hover:text-white'}`}>
                {l}
              </button>
            ))}
          </div>

          {/* Filters (communs aux deux onglets) */}
          <div className="bg-gray-800/60 border border-gray-700 rounded-xl p-4 space-y-3">
            <div className="flex flex-wrap gap-4 items-end">
              <h2 className="text-lg font-bold text-green-400 self-center mr-1">Dashboard</h2>
              <div>
                <p className="text-xs text-gray-500 mb-1">Période</p>
                <div className="flex gap-1 bg-gray-900 rounded-lg p-1">
                  {[['7','7j'],['30','30j'],['all','Tout'],['custom','Plage']].map(([v,l]) => (
                    <button key={v} onClick={() => { setPeriod(v); setPage(1); }}
                      className={`px-3 py-1 rounded text-xs font-medium transition-colors
                        ${period===v ? 'bg-green-600 text-white' : 'text-gray-400 hover:text-white'}`}>{l}</button>
                  ))}
                </div>
              </div>
              {isCustom && (
                <div>
                  <p className="text-xs text-gray-500 mb-1">Du</p>
                  <input type="date" value={dateFrom} onChange={e => { setDateFrom(e.target.value); setPage(1); }}
                    className="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-green-500" />
                </div>
              )}
              {isCustom && (
                <div>
                  <p className="text-xs text-gray-500 mb-1">Au</p>
                  <input type="date" value={dateTo} onChange={e => { setDateTo(e.target.value); setPage(1); }}
                    className="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-green-500" />
                </div>
              )}
              {(fRoom.length+fFormat.length+fBuyin.length+fField.length) > 0 && (
                <button onClick={() => { setFRoom([]); setFFormat([]); setFBuyin([]); setFField([]); setPage(1); }}
                  className="text-xs text-red-400 hover:text-red-300 border border-red-800 hover:border-red-600 rounded px-2 py-1 transition-colors self-end">
                  ✕ Réinitialiser
                </button>
              )}
            </div>

            {/* Filtres multi-sélection */}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
              {/* Room */}
              <div>
                <p className="text-xs text-gray-500 mb-1.5">Room {fRoom.length > 0 && <span className="text-green-400">({fRoom.length})</span>}</p>
                <div className="flex flex-wrap gap-1">
                  {ROOMS.map(r => (
                    <button key={r} onClick={() => toggle(setFRoom)(r)}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-colors
                        ${fRoom.includes(r)
                          ? 'border-transparent text-white ' + ROOM_CLS[r]
                          : 'border-gray-600 text-gray-400 hover:border-gray-400 hover:text-gray-200'}`}>
                      {r}
                    </button>
                  ))}
                </div>
              </div>

              {/* Format */}
              <div>
                <p className="text-xs text-gray-500 mb-1.5">Format {fFormat.length > 0 && <span className="text-green-400">({fFormat.length})</span>}</p>
                <div className="flex flex-wrap gap-1">
                  {FORMATS.map(f => (
                    <button key={f} onClick={() => toggle(setFFormat)(f)}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-colors
                        ${fFormat.includes(f)
                          ? 'border-transparent text-white ' + FMT_CLS[f]
                          : 'border-gray-600 text-gray-400 hover:border-gray-400 hover:text-gray-200'}`}>
                      {f}
                    </button>
                  ))}
                </div>
              </div>

              {/* Buy-In */}
              <div>
                <p className="text-xs text-gray-500 mb-1.5">Buy-In {fBuyin.length > 0 && <span className="text-green-400">({fBuyin.length})</span>}</p>
                <div className="flex flex-wrap gap-1">
                  {BUY_INS.map(b => (
                    <button key={b} onClick={() => toggle(setFBuyin)(b)}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-colors
                        ${fBuyin.includes(b)
                          ? 'bg-indigo-600 border-indigo-500 text-white'
                          : 'border-gray-600 text-gray-400 hover:border-gray-400 hover:text-gray-200'}`}>
                      {b}€
                    </button>
                  ))}
                </div>
              </div>

              {/* Field */}
              <div>
                <p className="text-xs text-gray-500 mb-1.5">Field {fField.length > 0 && <span className="text-green-400">({fField.length})</span>}</p>
                <div className="flex flex-wrap gap-1">
                  {FIELDS.map(f => (
                    <button key={f} onClick={() => toggle(setFField)(f)}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-colors
                        ${fField.includes(f)
                          ? 'bg-cyan-700 border-cyan-600 text-white'
                          : 'border-gray-600 text-gray-400 hover:border-gray-400 hover:text-gray-200'}`}>
                      {f}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* KPIs */}
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
            <KpiCard label="Sessions Grind"  value={kpi.grind} />
            <KpiCard label="Total Heures"    value={`${kpi.hours}h`} />
            <KpiCard label="Tournois / Re-Entry" value={`${kpi.total} / ${kpi.reEntries}`} color="text-orange-400" />
            <KpiCard label="ROI" value={`${kpi.roi}%`} color={Number(kpi.roi)>=0?'text-green-400':'text-red-400'} />
            <KpiCard label="Profit Net" value={`${kpi.profit>=0?'+':''}${kpi.profit.toFixed(2)}€`} color={kpi.profit>=0?'text-green-400':'text-red-400'} />
            <KpiCard label="ITM Rate" value={`${kpi.itmR}%`} color="text-yellow-400" />
          </div>

          {/* Charts row 1 */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Profit Cumulé</p>
              <ResponsiveContainer width="100%" height={200}>
                <LineChart data={cumulData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="date" tick={{ fill:'#9ca3af', fontSize:10 }} />
                  <YAxis tick={{ fill:'#9ca3af', fontSize:10 }} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [`${v}€`, 'Profit']} />
                  <Line type="monotone" dataKey="profit" stroke="#22c55e" strokeWidth={2} dot={false} />
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Profit par Room</p>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={byRoom}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="room" tick={{ fill:'#9ca3af', fontSize:11 }} />
                  <YAxis tick={{ fill:'#9ca3af', fontSize:11 }} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [`${v}€`, 'Profit']} />
                  <Bar dataKey="profit" radius={[4,4,0,0]}>
                    {byRoom.map(e => <Cell key={e.room} fill={ROOM_CHART[e.room]||'#6b7280'} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* ══════════ ONGLET TOURNOIS ══════════ */}
          {dashTab === 'tournois' && (<>

          {/* Charts row 2 */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Profit par Format</p>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={byFormat}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="format" tick={{ fill:'#9ca3af', fontSize:11 }} />
                  <YAxis tick={{ fill:'#9ca3af', fontSize:11 }} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [`${v.toFixed(2)}€`, 'Profit']} />
                  <Bar dataKey="profit" radius={[4,4,0,0]}>
                    {byFormat.map(e => <Cell key={e.format} fill={FMT_CHART[e.format]||'#6b7280'} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Profit par Field</p>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={byField} layout="vertical" barSize={18}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis type="number" tick={{ fill:'#9ca3af', fontSize:10 }} />
                  <YAxis type="category" dataKey="field" tick={{ fill:'#9ca3af', fontSize:10 }} width={64} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [`${v.toFixed(2)}€`, 'Profit']} />
                  <Bar dataKey="profit" radius={[0,4,4,0]}>
                    {byField.map(e => <Cell key={e.field} fill={e.profit>=0?'#06b6d4':'#f97316'} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Profit par Buy-In</p>
              <ResponsiveContainer width="100%" height={Math.max(180, byBuyin.length * 32)}>
                <BarChart data={byBuyin} layout="vertical" barSize={18}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis type="number" tick={{ fill:'#9ca3af', fontSize:10 }} />
                  <YAxis type="category" dataKey="buyin" tick={{ fill:'#9ca3af', fontSize:11 }} width={36} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [`${v.toFixed(2)}€`, 'Profit']} />
                  <Bar dataKey="profit" radius={[0,4,4,0]}>
                    {byBuyin.map(e => <Cell key={e.buyin} fill={e.profit>=0?'#22c55e':'#ef4444'} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* Table détail tournois */}
          <div className="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden">
            <p className="text-sm font-semibold text-gray-300 px-4 py-3 border-b border-gray-700">
              Détail — {filtered.length} tournois
            </p>
            <div className="overflow-x-auto">
              <table className="w-full text-sm" style={{ minWidth:'780px' }}>
                <thead className="bg-gray-900 text-gray-400 text-xs uppercase">
                  <tr>
                    <SortTh col="date">Date</SortTh>
                    <SortTh col="session">Session</SortTh>
                    <SortTh col="room">Room</SortTh>
                    <SortTh col="buyIn">Buy-In</SortTh>
                    <SortTh col="format">Format</SortTh>
                    <SortTh col="field">Field</SortTh>
                    <SortTh col="itm">ITM</SortTh>
                    <SortTh col="gains">Gains</SortTh>
                    <SortTh col="profit">Profit</SortTh>
                  </tr>
                </thead>
                <tbody>
                  {pageData.map(t => (
                    <tr key={t.id} className={`border-t border-gray-700 hover:bg-gray-700/30
                      ${t.profit>0?'bg-green-950/30':t.profit<0?'bg-red-950/20':''}`}>
                      <td className="px-3 py-2 text-gray-400 text-xs">{t.date}</td>
                      <td className="px-3 py-2 font-mono text-green-400">{t.session}</td>
                      <td className="px-3 py-2"><Badge cls={ROOM_CLS[t.room]}>{t.room}</Badge></td>
                      <td className="px-3 py-2 text-gray-300">{t.buyIn}€</td>
                      <td className="px-3 py-2"><Badge cls={FMT_CLS[t.format]}>{t.format}</Badge></td>
                      <td className="px-3 py-2 text-gray-400 text-xs">{t.field}</td>
                      <td className="px-3 py-2 text-center">{t.itm ? <span className="text-green-400 font-bold">✓</span> : <span className="text-gray-700">—</span>}</td>
                      <td className="px-3 py-2 text-gray-300">{t.gains>0?`${t.gains}€`:'—'}</td>
                      <td className={`px-3 py-2 font-bold ${t.profit>0?'text-green-400':t.profit<0?'text-red-400':'text-gray-500'}`}>
                        {t.profit>0?'+':''}{t.profit.toFixed(2)}€
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {totalPages > 1 && (
              <div className="flex gap-2 items-center justify-center py-3 border-t border-gray-700">
                <Btn onClick={() => setPage(p => Math.max(1,p-1))} cls="bg-gray-700 hover:bg-gray-600 text-white" disabled={page===1}>←</Btn>
                <span className="text-xs text-gray-400">{page} / {totalPages}</span>
                <Btn onClick={() => setPage(p => Math.min(totalPages,p+1))} cls="bg-gray-700 hover:bg-gray-600 text-white" disabled={page===totalPages}>→</Btn>
              </div>
            )}
          </div>
          </>)}

          {/* ══════════ ONGLET STRUCTURE ══════════ */}
          {dashTab === 'sessions' && (<>

          {/* Ratio Grind / Travail */}
          <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
            <p className="text-sm font-semibold text-gray-300 mb-4">Ratio Temps Grind / Travail</p>
            <div className="flex items-center gap-6 mb-3">
              <div className="text-center">
                <p className="text-2xl font-bold text-green-400">{structData.hGrind}h</p>
                <p className="text-xs text-gray-500 mt-0.5">Grind ({structData.ratioG}%)</p>
              </div>
              <div className="flex-1">
                <div className="flex h-5 rounded-full overflow-hidden bg-gray-700">
                  {structData.ratioG > 0 && (
                    <div className="bg-green-500 flex items-center justify-center text-xs font-bold text-white transition-all"
                      style={{ width:`${structData.ratioG}%` }}>
                      {structData.ratioG >= 15 ? `${structData.ratioG}%` : ''}
                    </div>
                  )}
                  {structData.ratioT > 0 && (
                    <div className="bg-blue-500 flex items-center justify-center text-xs font-bold text-white transition-all"
                      style={{ width:`${structData.ratioT}%` }}>
                      {structData.ratioT >= 15 ? `${structData.ratioT}%` : ''}
                    </div>
                  )}
                </div>
              </div>
              <div className="text-center">
                <p className="text-2xl font-bold text-blue-400">{structData.hTravail}h</p>
                <p className="text-xs text-gray-500 mt-0.5">Travail ({structData.ratioT}%)</p>
              </div>
            </div>
            <p className="text-xs text-gray-600 text-center">Total : {structData.total}h sur la période</p>
          </div>

          {/* Tournois par Format + par Type de session */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Tournois par Format</p>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={structData.byFormatCount}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="name" tick={{ fill:'#9ca3af', fontSize:12 }} />
                  <YAxis tick={{ fill:'#9ca3af', fontSize:11 }} allowDecimals={false} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [v, 'Tournois']} />
                  <Bar dataKey="value" radius={[4,4,0,0]}>
                    {structData.byFormatCount.map(e => <Cell key={e.name} fill={FMT_CHART[e.name]||'#6b7280'} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Tournois par Type de Session</p>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={structData.byMomentCount}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="name" tick={{ fill:'#9ca3af', fontSize:12 }} />
                  <YAxis tick={{ fill:'#9ca3af', fontSize:11 }} allowDecimals={false} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [v, 'Tournois']} />
                  <Bar dataKey="value" radius={[4,4,0,0]}>
                    {structData.byMomentCount.map(e => <Cell key={e.name} fill={e.fill} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* Tournois par Field + par Buy-In */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Tournois par Field</p>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={structData.byFieldCount} layout="vertical" barSize={18}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis type="number" tick={{ fill:'#9ca3af', fontSize:10 }} allowDecimals={false} />
                  <YAxis type="category" dataKey="name" tick={{ fill:'#9ca3af', fontSize:10 }} width={68} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [v, 'Tournois']} />
                  <Bar dataKey="value" fill="#a78bfa" radius={[0,4,4,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>

            <div className="bg-gray-800 border border-gray-700 rounded-lg p-4">
              <p className="text-sm font-semibold text-gray-300 mb-3">Tournois par Buy-In</p>
              <ResponsiveContainer width="100%" height={Math.max(180, structData.byBuyinCount.length * 32)}>
                <BarChart data={structData.byBuyinCount} layout="vertical" barSize={18}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis type="number" tick={{ fill:'#9ca3af', fontSize:10 }} allowDecimals={false} />
                  <YAxis type="category" dataKey="name" tick={{ fill:'#9ca3af', fontSize:11 }} width={36} />
                  <Tooltip contentStyle={ttStyle} labelStyle={ttLabelStyle} itemStyle={ttItemStyle} formatter={v => [v, 'Tournois']} />
                  <Bar dataKey="value" fill="#38bdf8" radius={[0,4,4,0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
          </>)}

        </div>
      );
    }

    // ─── LOCALSTORAGE HELPERS ─────────────────────────────────────
    const LS_KEYS = { grids: 'pt_grids', sessions: 'pt_sessions', played: 'pt_played' };
    const LS_GRIDS_VERSION = '1';
    // Réinitialise uniquement les grilles si la version change (jamais les sessions/tournois)
    (function migrateGrids() {
      try {
        if (localStorage.getItem('pt_grids_version') !== LS_GRIDS_VERSION) {
          localStorage.removeItem(LS_KEYS.grids);
          localStorage.setItem('pt_grids_version', LS_GRIDS_VERSION);
        }
      } catch {}
    })();

    function lsGet(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch { return fallback; }
    }

    function lsSet(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }

    // ── usePersist : localStorage (cache offline) + Firestore (sync multi-appareils) ──
    function usePersist(key, initial) {
      const [state, setState] = useState(() => lsGet(key, initial));
      const ready    = useRef(false);  // Firestore a répondu au moins une fois
      const skipNext = useRef(false);  // évite d'écrire ce qu'on vient de lire

      // Écoute temps réel Firestore
      useEffect(() => {
        const unsub = db.collection('pt').doc(key).onSnapshot(
          snap => {
            if (snap.exists) {
              skipNext.current = true;
              const val = snap.data().v;
              setState(val);
              lsSet(key, val);
            } else {
              // Première connexion : on pousse les données locales vers Firestore
              db.collection('pt').doc(key).set({ v: lsGet(key, initial) }).catch(() => {});
            }
            ready.current = true;
          },
          () => { ready.current = true; } // hors-ligne : on reste sur localStorage
        );
        return unsub;
      }, []);

      // Écriture vers Firestore + localStorage à chaque changement local
      useEffect(() => {
        if (skipNext.current) { skipNext.current = false; return; }
        if (!ready.current) return;
        lsSet(key, state);
        db.collection('pt').doc(key).set({ v: state }).catch(() => {});
      }, [state]);

      return [state, setState];
    }

    // ─── ROOT ─────────────────────────────────────────────────────
    function PokerTracker() {
      const [activeTab, setActiveTab]       = useState('library');
      const [savedGrids, setSavedGrids]     = usePersist(LS_KEYS.grids,    INIT_GRIDS);
      const [sessions,   setSessions]       = usePersist(LS_KEYS.sessions,  INIT_SESSIONS);
      const [played,     setPlayed]         = usePersist(LS_KEYS.played,    INIT_PLAYED);
      const [online, setOnline]             = useState(navigator.onLine);
      useEffect(() => {
        const on  = () => setOnline(true);
        const off = () => setOnline(false);
        window.addEventListener('online', on);
        window.addEventListener('offline', off);
        return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
      }, []);

      const TABS = [
        { id:'library',   emoji:'📋', label:'Mes Grilles'        },
        { id:'grid',      emoji:'📅', label:'Grille du Jour'     },
        { id:'sessions',  emoji:'🎯', label:'Sessions & Tournois'},
        { id:'dashboard', emoji:'📊', label:'Dashboard'          },
      ];

      return (
        <div className="min-h-screen bg-gray-900 text-white">
          <header className="bg-gray-950 border-b border-gray-800 px-5 py-3 flex items-center gap-3">
            <span className="text-3xl leading-none">♠</span>
            <div>
              <h1 className="text-xl font-bold text-green-400 tracking-wide leading-none">PokerTrack</h1>
              <p className="text-xs text-gray-600 leading-none mt-0.5">Tournament Tracker</p>
            </div>
            <div className="ml-auto flex items-center gap-4">
              <div className="flex gap-3 text-xs text-gray-600">
                <span>{savedGrids.length} grille{savedGrids.length!==1?'s':''}</span>
                <span>·</span>
                <span>{sessions.length} sessions</span>
                <span>·</span>
                <span>{played.length} tournois joués</span>
              </div>
              <div className="flex items-center gap-1.5 text-xs" title={online ? 'Synchronisé avec Firebase' : 'Hors-ligne — données locales'}>
                <span className={`w-2 h-2 rounded-full ${online ? 'bg-green-400' : 'bg-gray-600'}`} />
                <span className={online ? 'text-green-500' : 'text-gray-600'}>{online ? '☁ Sync' : 'Hors-ligne'}</span>
              </div>
              <button
                onClick={() => {
                  if (confirm('Réinitialiser toutes les données avec les démos ?')) {
                    setSavedGrids(INIT_GRIDS);
                    setSessions(INIT_SESSIONS);
                    setPlayed(INIT_PLAYED);
                  }
                }}
                className="text-xs text-gray-600 hover:text-red-400 transition-colors"
                title="Réinitialiser les données">
                ↺ Reset
              </button>
            </div>
          </header>

          <nav className="bg-gray-900 border-b border-gray-800 px-2 flex gap-0.5 overflow-x-auto">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`px-5 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap flex items-center gap-1.5
                  ${activeTab===t.id
                    ? 'border-green-500 text-green-400'
                    : 'border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-600'}`}>
                <span>{t.emoji}</span>{t.label}
              </button>
            ))}
          </nav>

          <main className="max-w-screen-xl mx-auto">
            {activeTab==='library'   && <GridsTab savedGrids={savedGrids} setSavedGrids={setSavedGrids} />}
            {activeTab==='grid'      && <DailyGridTab savedGrids={savedGrids} setPlayedTournaments={setPlayed} sessions={sessions} setSessions={setSessions} />}
            {activeTab==='sessions'  && <SessionsTab sessions={sessions} setSessions={setSessions} playedTournaments={played} setPlayed={setPlayed} />}
            {activeTab==='dashboard' && <DashboardTab sessions={sessions} playedTournaments={played} />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PokerTracker />);
  </script>
</body>
</html>
